architecture_history:
  - version: "C (Híbrido Pragmático)"
    superseded_at: "2026-05-01"
    razao: "16GB RAM era desproporcional para single-user single-contract — Eric sinalizou peso excessivo"
  - version: "D (LEAN)"
    decided_at: "2026-05-01"
