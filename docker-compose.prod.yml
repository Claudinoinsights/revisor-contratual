# ════════════════════════════════════════════════════════════════════════════
# Revisor Contratual — docker-compose.prod.yml (VPS production deploy)
#
# Resolve Smith F-CRIT-01 + Eric directive Caminho B deploy completo.
# Usa Traefik EXISTING no VPS (rede `proxy`) — não cria reverse proxy novo.
#
# Pré-requisitos VPS:
#   1. Docker 29+ instalado (✓ confirmed)
#   2. Network `proxy` criada (Traefik existing — ✓ confirmed)
#   3. DNS A record `revisor.claudinoinsights.com → 91.108.126.149` (Eric configura)
#   4. /opt/revisor-contratual/ existe + .env.docker.prod com 600 perms
#
# Uso:
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#   docker exec revisor-prod-ollama-advogado ollama pull qwen2.5:7b
#   docker exec revisor-prod-ollama-economista ollama pull qwen2.5:3b
#   docker exec revisor-prod-app revisor init-audit
# ════════════════════════════════════════════════════════════════════════════

name: revisor-prod

services:
  # Sprint 7 Phase 2 (D-OPS-S07-002): Container consolidation 2→1 (ADR-028).
  # Substituiu ollama-advogado + ollama-economista por single ollama-shared service.
  # Memory: 12G reservado (6+6) → 4G = -8 GiB overcommit reduction.
  # Volume migrated via rsync from advogado (preserva qwen2.5:7b 4.7GB + qwen2.5:3b 1.9GB).
  # App env vars indirection (OLLAMA_HOST_*=ollama-shared:11434) preserva pipeline.py code.
  # ADR-028: governance/architecture/adr/adr-028-ollama-single-container-consolidation.md
  ollama-shared:
    image: ollama/ollama:latest
    container_name: revisor-prod-ollama-shared
    restart: unless-stopped
    # Sprint 7 Phase 1 (D-OPS-S07-001) 8 OLLAMA_* env vars absorved em ADR-028.
    # CRITICAL: OLLAMA_CONTEXT_LENGTH (Ollama 0.5+); OLLAMA_NUM_CTX deprecated.
    environment:
      OLLAMA_KEEP_ALIVE: "5m"           # tier=lean usa qwen2.5:3b para 3 personas — single load
      OLLAMA_NUM_PARALLEL: "1"          # SaaS B2B MVP 1-3 users — sem paralelismo
      OLLAMA_MAX_LOADED_MODELS: "1"     # 1 modelo por vez (tier=lean qwen2.5:3b OR balanced qwen2.5:7b)
      OLLAMA_CONTEXT_LENGTH: "8192"     # CDC veículo ~5600 tokens — sem truncação
      OLLAMA_NUM_THREAD: "2"            # match nproc=2 VPS Hetzner
      OLLAMA_FLASH_ATTENTION: "1"       # Ollama 0.24+ memory efficient attention
      OLLAMA_KV_CACHE_TYPE: "q8_0"      # -50% KV cache memory, <1% quality loss
      OLLAMA_LOAD_TIMEOUT: "180s"       # faster failure detection
    expose:
      - "11434"
    volumes:
      - ollama-models-shared:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - revisor-internal
    deploy:
      resources:
        limits:
          memory: 4G   # ADR-028: -2G vs 6G anterior, naturally fits qwen2.5:3b (1.9G) + KV q8_0 (153 MiB) + overhead com 1.5x buffer

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: revisor-contratual:prod
    container_name: revisor-prod-app
    restart: unless-stopped
    expose:
      - "8501"
    environment:
      # Sprint 7 Phase 2 (ADR-028): env vars indirection ollama-shared substituindo 2 containers separados.
      # pipeline.py code unchanged — apenas hostname mudou para ambas personas.
      OLLAMA_HOST_ADVOGADO: "ollama-shared:11434"
      OLLAMA_HOST_ECONOMISTA: "ollama-shared:11434"
      OLLAMA_BINARY_PATH: "/bin/true"
      REVISOR_HTTPS_ONLY: "1"
      PYTHONIOENCODING: "utf-8"
      PYTHONUNBUFFERED: "1"
    env_file:
      - .env.docker.prod
    volumes:
      - revisor-data:/home/revisor/.local/share/revisor-contratual
      - marker-cache:/home/revisor/.cache/datalab
    depends_on:
      # Sprint 7 Phase 2 (ADR-028): single ollama-shared dependency (substituindo 2 atuais)
      ollama-shared:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 6G   # F-PROD-NEW-20 fix (D-SMITH-S06-034 OOM CONFIRMED): 4G→6G — Tesseract OCR PDF complexo + Python + Ollama clients peak ~4.13 GiB anon-rss confirmado via dmesg 6 kills; 6G dá ~50% buffer + cabe em VPS 7.8 GiB total preservando OS + Ollama runtime ~1.8 GiB
    networks:
      - revisor-internal
      - proxy
    labels:
      # Traefik existing (VPS) auto-HTTPS via Let's Encrypt
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.revisor.rule=Host(`revisor.claudinoinsights.com`)"
      - "traefik.http.routers.revisor.entrypoints=websecure"
      - "traefik.http.routers.revisor.tls=true"
      - "traefik.http.routers.revisor.tls.certresolver=letsencrypt"
      - "traefik.http.services.revisor.loadbalancer.server.port=8501"
      # Redirect HTTP → HTTPS
      - "traefik.http.routers.revisor-http.rule=Host(`revisor.claudinoinsights.com`)"
      - "traefik.http.routers.revisor-http.entrypoints=web"
      - "traefik.http.routers.revisor-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      # Security headers
      - "traefik.http.middlewares.revisor-sec.headers.framedeny=true"
      - "traefik.http.middlewares.revisor-sec.headers.sslredirect=true"
      - "traefik.http.middlewares.revisor-sec.headers.stsseconds=31536000"
      - "traefik.http.middlewares.revisor-sec.headers.contenttypenosniff=true"
      - "traefik.http.routers.revisor.middlewares=revisor-sec"

volumes:
  # Sprint 7 Phase 2 (ADR-028): consolidated volume substituindo ollama-models-advogado + economista.
  # Volume migrated via rsync from advogado (preserva qwen2.5:7b 4.7GB + qwen2.5:3b 1.9GB = 6.2 GiB).
  # Volumes antigos (ollama-models-advogado + economista) preserved no host como backup,
  # removable em Sprint 7 polish (Phase 5) após Smith verify Phase 2 CLEAN.
  ollama-models-shared:
    name: revisor-prod_ollama-models-shared
  revisor-data:
    name: revisor-prod_revisor-data
  marker-cache:
    name: revisor-prod_marker-cache

networks:
  revisor-internal:
    name: revisor-prod_internal
    driver: bridge
  proxy:
    external: true
    name: proxy
