name: CI

# CI minimal SAFE para Revisor Contratual (flat repo, dedicated)
# - Roda em push/PR para main + workflow_dispatch
# - Sem secrets, sem deploy
# - Matrix Python 3.11 + 3.12

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancela runs antigos no mesmo PR/branch quando push novo chega
concurrency:
  group: revisor-contratual-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install pip deps (sem heavy ML)
        # Instalamos manualmente apenas as deps necessárias para a suite passar
        # offline (sem sentence-transformers / torch / pymupdf que são ~1GB+ no CI)
        run: |
          python -m pip install --upgrade pip
          pip install \
            'pydantic>=2.8' \
            'sqlite-vec>=0.1' \
            'rank_bm25>=0.2' \
            'beautifulsoup4>=4.12' \
            'python-bcb>=0.3' \
            'tenacity>=9.0' \
            'diskcache>=5.6' \
            'pyyaml>=6.0' \
            'langchain-ollama>=0.2.0' \
            'click>=8.1' \
            'rich>=13.0' \
            'pytest>=8.0' \
            'pytest-asyncio>=0.23'

      - name: Run pytest suite
        # Override addopts para evitar dependência de pytest-cov no CI (NFR-MAINT-02
        # de cobertura é local-only enquanto não temos coverage reporter externo)
        run: |
          python -m pytest tests/ -o addopts="" --tb=short -v

      - name: Suite summary
        if: always()
        run: |
          echo "=== Suite executada em Python ${{ matrix.python-version }} ==="
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
