<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revisor Contratual</title>
  <!-- Fontes self-hosted em /static/fonts/ via @font-face em tokens.css (REV-INT-02 — LGPD on-premise, sem CDN externo) -->
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/htmx-sse.js" defer></script>
</head>
<body>
  <header class="topbar">
    <span class="mark">⚖</span>
    <span class="brand">Revisor</span>
  </header>

  <aside class="sidebar">
    <h3>Histórico</h3>
    {% block sidebar %}{% endblock %}
  </aside>

  <main class="container">
    <div id="workspace">
      {% block workspace %}{% endblock %}
    </div>
  </main>
</body>
</html>
