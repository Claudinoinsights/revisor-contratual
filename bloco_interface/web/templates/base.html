<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revisor Contratual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/htmx-sse.js" defer></script>
</head>
<body>
  <header class="topbar">
    <span class="mark">⚖</span>
    <span class="brand">Revisor</span>

  <aside class="sidebar">
    <h3>Histórico</h3>
    {% block sidebar %}{% endblock %}
  </aside>

  <main class="container">
    <div id="workspace">
      {% block workspace %}{% endblock %}
    </div>
  </main>
</body>
</html>
