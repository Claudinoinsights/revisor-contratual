<div hx-ext="sse" sse-connect="/pipeline-stream?job_id={{ job_id }}" id="sse-container" data-job-id="{{ job_id }}">
  <div class="processing-head">Analisando <code>{{ filename }}</code></div>

  <div class="progress"><div id="progress-bar"></div></div>

  <div class="pipeline" id="pipeline-steps">
    {% for step in steps %}
      <div class="step pending" data-index="{{ loop.index0 }}">
        <span class="step-icon">·</span>
        <span class="step-name">{{ step }}</span>
      </div>
    {% endfor %}
  </div>
</div>

<script>
  // UI-1 Phase B: listener anexado ao elemento sse-container que é REMOVIDO no swap
  // (resolve TD-WEB-LISTENER-LEAK-01). Garbage collected automaticamente pelo browser
  // quando htmx.ajax substitui #workspace innerHTML.
  (function () {
    const container = document.getElementById('sse-container');
    if (!container) return;

    const jobId = container.dataset.jobId || '';

    container.addEventListener('htmx:sseMessage', function (e) {
      let data;
      try {
        data = JSON.parse(e.detail.data);
      } catch (_err) {
        return;
      }

      // UI-1 Phase D: handle pipeline error event
      if (e.detail.type === 'error' || data.error) {
        const url = '/verdict?job_id=' + encodeURIComponent(jobId);
        htmx.ajax('GET', url, { target: '#workspace', swap: 'innerHTML' });
        return;
      }

      if (data.done) {
        const url = '/verdict?job_id=' + encodeURIComponent(jobId);
        htmx.ajax('GET', url, { target: '#workspace', swap: 'innerHTML' });
        return;
      }

      const steps = document.querySelectorAll('.step');
      steps.forEach((s, i) => {
        s.classList.remove('pending', 'active', 'done');
        const icon = s.querySelector('.step-icon');
        if (i < data.index) {
          s.classList.add('done');
          if (icon) icon.textContent = '✓';
        } else if (i === data.index) {
          s.classList.add('active');
          if (icon) icon.textContent = '○';
        } else {
          s.classList.add('pending');
          if (icon) icon.textContent = '·';
        }
      });

      const pct = ((data.index + 1) / data.total) * 100;
      const bar = document.getElementById('progress-bar');
      if (bar) bar.style.width = pct + '%';
    });
  })();
</script>
